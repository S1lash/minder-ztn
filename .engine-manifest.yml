# Skeleton extraction manifest.
#
# Single source of truth for which paths leave this personal instance and
# land in the public skeleton (`minder-ztn`).
#
# Categories:
#   engine    — synced upstream-to-downstream as engine updates land.
#               Friends do not edit engine paths; they pull updates via
#               `scripts/sync_engine.sh`.
#   template  — seed files. Copied once into the skeleton with the
#               `.template` suffix stripped. After clone, become friend's
#               data and stop syncing.
#   exclude   — explicit listing of paths intentionally NOT in the
#               skeleton. Default behaviour of `release_engine.py` is
#               deny-by-default; this list exists for human readability.
#
# Path semantics:
#   - trailing `/` means recursive directory copy
#   - no trailing `/` means single file
#   - patterns `**` not supported — list explicit subpaths instead
#
# Owner: see SOUL.md Identity. Engine code never names the owner.

version: 1

engine:
  # Integration tooling (rules, commands, skills, install scripts)
  - integrations/claude-code/rules/
  - integrations/claude-code/commands/
  - integrations/claude-code/skills/
  - integrations/claude-code/install.sh
  - integrations/claude-code/uninstall.sh
  - integrations/claude-code/scheduler-prompts/
  - integrations/claude-code/SETUP_PROMPT.md
  - integrations/minder-ztn-mcp/

  # Obsidian vault config seed — `vault-config/` ships canonical
  # `.obsidian/` defaults; `seed.sh` is invoked by Claude install.sh and
  # idempotently copies them into <vault>/.obsidian/ only when missing.
  # Engine improvements flow to friends via sync_engine.sh; the live
  # `.obsidian/` in friend's vault is never overwritten on update.
  - integrations/obsidian/

  # Cross-cutting scripts
  - scripts/

  # Engine documentation (spec / architecture)
  - zettelkasten/_system/docs/

  # Engine python pipeline + tests
  - zettelkasten/_system/scripts/

  # Batches directory contract — companion to manifest-schema/README.md.
  # Documents naming, ordering, retention, JSON/MD pair, archive, backup.
  # Pure spec; ships as-is to skeleton so friends inherit the contract.
  - zettelkasten/_system/state/batches/README.md

  # Onboarding profile seed — pristine template shipped VERBATIM (keeps
  # the `.template.md` suffix, so /ztn:process never ingests it via the
  # engine-wide `*.template.md` exclusion). Friends copy it to PROFILE.md
  # in the same folder and fill the copy; /ztn:bootstrap reads the filled
  # profile as PRIMARY source for SOUL.md and moves consumed files to
  # _sources/processed/describe-me/. Listed under engine (not template)
  # so spec updates to the template keep syncing.
  - zettelkasten/_sources/inbox/describe-me/PROFILE.template.md

  # Engine spec — folder routing
  - zettelkasten/_system/registries/FOLDERS.md

  # Engine spec — concept naming canonical format. Pure spec; no owner
  # mutations. Friends pull updates via sync_engine.sh.
  - zettelkasten/_system/registries/CONCEPT_NAMING.md

  # Engine spec — concept-type frozen mirror of Minder's ConceptType
  # enum (18 values). Drift-detector via test_common.py parity test.
  # Pure spec; no owner mutations; manual upstream re-mirror only.
  - zettelkasten/_system/registries/CONCEPT_TYPES.md

  # Agent-lens — registry doc + frame contract + lens prompts.
  # AGENT_LENSES.md ships as the spec + concept doc with the lens registry
  # table. Friends override their local table after first sync; engine
  # maintainer evolves spec and lens set via release_engine.
  # _frame.md is the two-stage thinker→structurer contract — pure engine,
  # never owner-edited.
  # lenses/{id}/ folders are lens prompts. MOST general proposer-lenses ship
  # `status: active` (they read universal record types and no-op gracefully
  # on empty data). Lenses in release_engine `DEMOTE_LENSES_ON_RELEASE` ship
  # `status: draft` instead — either prerequisite-gated (biometric) or a
  # high-trust opt-in (cognitive-model mines private reflections for
  # identity/values candidates), so friends enable them deliberately.
  - zettelkasten/_system/registries/AGENT_LENSES.md
  - zettelkasten/_system/registries/lenses/

  # Engine philosophy + processing principles + note templates
  - zettelkasten/5_meta/CONCEPT.md
  - zettelkasten/5_meta/PROCESSING_PRINCIPLES.md
  - zettelkasten/5_meta/templates/

  # Constitution starter pack (opt-in via /ztn:bootstrap --with-starter-axioms)
  - zettelkasten/5_meta/starter-pack/

  # Engine quick-reference docs
  - zettelkasten/5_skills/

  # PARA explainers (READMEs, not personal content)
  - zettelkasten/1_projects/README.md
  - zettelkasten/2_areas/README.md
  - zettelkasten/3_resources/README.md
  - zettelkasten/_records/README.md

  # Constitution protocol (spec doc; owner's principles live in axiom/ etc subdirs)
  - zettelkasten/0_constitution/CONSTITUTION.md

  # Root meta (no CI ships to skeleton — see exclude:)
  - .gitignore
  - .gitattributes    # forces LF on shell/python — Windows friends must not get CRLF
  - .engine-manifest.yml
  - LICENSE
  - integrations/VERSION

  # Project-local Claude Code config (engine-development guide for
  # contributors). The local override `.claude/CLAUDE.local.md` and
  # `.claude/settings.local.json` are excluded — see `exclude:`.
  - .claude/CLAUDE.md
  - .claude/settings.json

  # Project-local skill discoverability for Claude Code Routines (cloud
  # cron). Routines clone the repo fresh and discover skills only at the
  # canonical `.claude/skills/<name>/SKILL.md` path. Each entry under here
  # is a relative symlink into `integrations/claude-code/skills/<name>/` —
  # release_engine.py preserves symlinks; resolved path exists in the
  # skeleton because the target is also engine-shipped.
  - .claude/skills/

  # Public-facing docs (friend onboarding + upstream sync)
  - CONTRIBUTING.md
  - docs/onboarding.md
  - docs/upstream-sync.md
  - docs/scheduling.md
  - docs/obsidian.md
  - docs/privacy.md
  - docs/CHANGELOG.md

template:
  # System layer
  - zettelkasten/_system/SOUL.template.md
  - zettelkasten/_system/long-form-playbook.template.md
  - zettelkasten/_system/TASKS.template.md
  - zettelkasten/_system/CALENDAR.template.md
  - zettelkasten/_system/POSTS.template.md

  # Public README (ships as README.md in the skeleton)
  - README.template.md

  # Registries
  - zettelkasten/_system/registries/TAGS.template.md
  - zettelkasten/_system/registries/SOURCES.template.md
  # AUDIENCES ships as template (not engine) because the file carries
  # both spec sections AND an owner-mutable Extensions table. Spec
  # updates flow via /ztn:update or manual diff; sync_engine.sh skips
  # templates so owner extensions are never wiped.
  - zettelkasten/_system/registries/AUDIENCES.template.md
  # DOMAINS ships as template — same rationale as AUDIENCES (spec sections
  # + owner-mutable Extensions table). Canonical thirteen are duplicated
  # in `_system/scripts/_common.py::ALLOWED_DOMAINS` (engine-synced); the
  # markdown spec is the human-readable mirror that owner can extend.
  - zettelkasten/_system/registries/DOMAINS.template.md
  - zettelkasten/1_projects/PROJECTS.template.md
  - zettelkasten/3_resources/people/PEOPLE.template.md

  # State (skills require these to exist before first run)
  - zettelkasten/_system/state/BATCH_LOG.template.md
  - zettelkasten/_system/state/CLARIFICATIONS.template.md
  - zettelkasten/_system/state/OPEN_THREADS.template.md
  - zettelkasten/_system/state/PROCESSED.template.md
  - zettelkasten/_system/state/log_maintenance.template.md
  - zettelkasten/_system/state/log_process.template.md
  - zettelkasten/_system/state/log_lint.template.md
  # insights-config seeds the smart-resolve engine driven by
  # /ztn:resolve-clarifications. Ships under .template; resolver copies
  # to live path on first run when missing. Owner-mutable thereafter.
  - zettelkasten/_system/state/insights-config.yaml.template
  # Content pipeline ledger — the only new content-pipeline state. Seeds
  # empty; /ztn:content --maintain populates `drafts` on first run.
  - zettelkasten/_system/state/content-pipeline-state.template.json

  # Metric-day pipeline live YAMLs — one-time seed at install; thereafter
  # owner can layer overrides via `*.local.yaml` (never shipped). The
  # paired `*.template.yaml` files sync via engine: (always upstream-
  # to-downstream), carrying spec updates. Live files start byte-
  # identical to their template siblings; divergence is owner's choice.
  - zettelkasten/_system/scripts/biometric_thresholds.yaml
  - zettelkasten/_system/scripts/activity_thresholds.yaml
  - zettelkasten/_system/scripts/affect_lexicon.yaml

  # Views (auto-generated, but file must exist for skills to write)
  - zettelkasten/_system/views/CURRENT_CONTEXT.template.md
  - zettelkasten/_system/views/HUB_INDEX.template.md
  - zettelkasten/_system/views/INDEX.template.md
  - zettelkasten/_system/views/CONTENT_MAP.template.md
  # Stub so installer symlink resolves before first /ztn:regen-constitution
  - zettelkasten/_system/views/constitution-core.template.md

  # Cognitive-model hub seed. Ships the empty axis scaffold; on the
  # friend's first /ztn:maintain, render_cognitive_model_hub.py backfills
  # it from THEIR own tagged principles. The live owner hub
  # (5_meta/mocs/hub-cognitive-model.md) is owner-data — never shipped
  # (the whole 5_meta/mocs/ dir is excluded; only this template uploads).
  # Spec portion (managed-zone structure) stays in sync with the renderer
  # via tests/test_render_cognitive_model_hub.py::test_template_matches_blank_render.
  - zettelkasten/5_meta/mocs/hub-cognitive-model.template.md


exclude:
  # Owner's deployment journal — not engine
  - platform/

  # Owner's data layers
  - zettelkasten/_records/meetings/
  - zettelkasten/_records/observations/
  - zettelkasten/_sources/inbox/
  - zettelkasten/_sources/processed/
  - zettelkasten/0_constitution/axiom/
  - zettelkasten/0_constitution/principle/
  - zettelkasten/0_constitution/rule/
  - zettelkasten/1_projects/
  - zettelkasten/2_areas/
  - zettelkasten/3_resources/ideas/
  - zettelkasten/3_resources/tech/
  - zettelkasten/3_resources/people/
  - zettelkasten/4_archive/
  - zettelkasten/5_meta/mocs/
  - zettelkasten/6_posts/

  # Live system files (templates ship instead)
  - zettelkasten/_system/SOUL.md
  - zettelkasten/_system/long-form-playbook.md
  - zettelkasten/_system/TASKS.md
  - zettelkasten/_system/CALENDAR.md
  - zettelkasten/_system/POSTS.md
  - zettelkasten/_system/registries/TAGS.md
  - zettelkasten/_system/registries/SOURCES.md
  - zettelkasten/_system/registries/AUDIENCES.md
  - zettelkasten/_system/registries/DOMAINS.md
  # CONCEPTS.md is auto-generated by /ztn:maintain Step 4.5 from each
  # tenant's corpus; no template ships — friends populate via their
  # own /ztn:maintain runs.
  - zettelkasten/_system/registries/CONCEPTS.md

  # Runtime state
  - zettelkasten/_system/state/
  - zettelkasten/_system/views/

  # Owner's live Obsidian vault state (seeded once by integrations/obsidian
  # /seed.sh; friend's customisations live here and must not leak upstream).
  # `.obsidian.backup-*` directories are created by `seed.sh --force`.
  - zettelkasten/.obsidian/
  - zettelkasten/.obsidian.backup-
  - zettelkasten/minder-ztn.md
  - zettelkasten/HOME.md
  # Help docs copied into the vault by integrations/obsidian/seed.sh.
  # Engine source for these lives in `integrations/obsidian/{guide,views}.md`
  # and `docs/{privacy,CHANGELOG}.md`; vault copies are owner-data after seed.
  - zettelkasten/5_meta/help/

  # Owner's personal README
  - README.md

  # Owner-only / generated
  - .DS_Store
  - .idea/
  - .claude/CLAUDE.local.md
  - .claude/settings.local.json
  - integrations/claude-code/built/

  # Owner-only CI. Friend's repo stays CI-free by design — engine quality
  # is upstream's concern, friend just consumes verified releases. Linter
  # is one-shot pre-extraction; tests verify engine scripts that ship to
  # friends. Both serve owner's quality assurance, not friend's runtime.
  - .github/workflows/

  # Note: `scripts/check_no_personal_data.{sh,py}` still ships to skeleton
  # (lives under engine `scripts/` glob). Harmless for friends — runs
  # clean against their non-personal data; provided as a convenience for
  # contributors who fork to send engine PRs upstream.
